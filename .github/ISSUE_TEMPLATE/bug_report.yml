name: Bug report
description: Report incorrect behaviour in the package, CLI, docs, or tests.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What were you trying to do?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include the smallest command or snippet that shows the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: This report does not include private data, credentials, or non-redistributable files.
          required: true
